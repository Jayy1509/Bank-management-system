<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loans - Rana Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <h1>Rana Bank</h1>
    <nav>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="branches.html">Branches</a></li>
        <li><a href="customers.html">Customers</a></li>
        <li><a href="accounts.html">Accounts</a></li>
        <li><a href="transactions.html">Transactions</a></li>
        <li><a href="loans.html" class="active">Loans</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="glass-panel">
      <h2>Add Loan Application</h2>
      <div id="messageBox" class="message"></div>
      <form id="loanForm">
        <label>Loan ID</label>
        <input type="number" id="loanId" required>

        <label>Loan Type</label>
        <select id="loanType">
          <option value="Home Loan">Home Loan</option>
          <option value="Car Loan">Car Loan</option>
          <option value="Personal Loan">Personal Loan</option>
          <option value="Education Loan">Education Loan</option>
        </select>

        <label>Loan Date</label>
        <input type="date" id="loanDate" required>

        <label>Amount requested</label>
        <input type="number" step="0.01" id="loanAmount" required>

        <label>Duration (in months)</label>
        <input type="number" id="loanDuration" required>

        <label>Monthly Installment (PMS)</label>
        <input type="number" step="0.01" id="loanPms" required>

        <label>Customer ID</label>
        <input type="number" id="loanCustId" required>

        <label>Branch ID</label>
        <input type="number" id="loanBranchId" required>

        <button type="submit">Submit Application</button>
      </form>
    </section>

    <section class="glass-panel">
      <h2>Active Loans</h2>
      <table id="loanTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Duration(m)</th>
            <th>Cust ID</th>
            <th>Branch ID</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dynamic -->
        </tbody>
      </table>
    </section>
  </main>

  <script src="js/loans.js"></script>
</body>

</html>
